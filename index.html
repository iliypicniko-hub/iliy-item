<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Products — iliy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400&family=Cormorant+Garamond:ital,wght@1,300&display=swap" rel="stylesheet">
<style>
:root{--bg:#f6f4f0;--white:#faf9f7;--ink:#252220;--mid:#7a766f;--faint:#c8c3bb;--accent:#4a6268;--sans:'Zen Kaku Gothic New',sans-serif;--en:'Cormorant Garamond',Georgia,serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--sans);font-weight:300;background:var(--bg);color:var(--ink);line-height:1.9;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
.r{opacity:0;transform:translateY(14px);transition:opacity 1s ease,transform 1s ease;}
.r.in{opacity:1;transform:translateY(0);}
.rf{opacity:0;transition:opacity 1.4s ease;}
.rf.in{opacity:1;}

/* HEADER */
.site-header{position:fixed;top:0;left:0;right:0;z-index:100;padding:1.4rem clamp(1.8rem,7vw,5.5rem);display:flex;justify-content:space-between;align-items:center;pointer-events:none;}
.site-header__name{font-size:.65rem;letter-spacing:.45em;color:rgba(255,255,255,.75);font-weight:300;pointer-events:auto;}
.site-header__sub{font-size:.55rem;letter-spacing:.3em;color:rgba(255,255,255,.4);}

/* OPENING */
.opening{position:relative;height:100svh;min-height:520px;overflow:hidden;}
.opening__bg{position:absolute;inset:0;background-size:cover;background-position:center;background-repeat:no-repeat;filter:brightness(.68) saturate(.82);transform:scale(1.04);animation:zmin 14s ease forwards;}
@keyframes zmin{to{transform:scale(1);}}
.opening__text{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;justify-content:flex-end;padding:0 clamp(1.8rem,7vw,5.5rem) clamp(4rem,10vh,7rem);}
.opening__label{font-size:.6rem;letter-spacing:.4em;color:rgba(255,255,255,.4);margin-bottom:1.2rem;opacity:0;animation:fin .8s .6s ease forwards;}
.opening__sub{font-size:clamp(.75rem,1.6vw,.9rem);letter-spacing:.18em;color:rgba(255,255,255,.7);line-height:2.3;opacity:0;animation:fin .9s .9s ease forwards;}
@keyframes fin{to{opacity:1;}}
.scroll-cue{position:absolute;bottom:2rem;right:2.5rem;z-index:3;display:flex;flex-direction:column;align-items:center;gap:.5rem;}
.scroll-cue span{font-size:.5rem;letter-spacing:.3em;color:rgba(255,255,255,.3);writing-mode:vertical-rl;}
.scroll-cue__bar{width:1px;height:40px;background:rgba(255,255,255,.15);overflow:hidden;position:relative;}
.scroll-cue__bar::after{content:'';position:absolute;top:-100%;left:0;width:1px;height:100%;background:rgba(255,255,255,.6);animation:drop 2s 1.5s ease-in-out infinite;}
@keyframes drop{0%{top:-100%;}100%{top:100%;}}

/* INTRO */
.intro{padding:clamp(5rem,12vw,10rem) clamp(1.8rem,7vw,5.5rem);max-width:480px;}
.intro p{font-size:.78rem;letter-spacing:.1em;line-height:2.8;color:#5a5750;}
.intro p+p{margin-top:1.8rem;}

/* SCENE */
.scene{display:grid;min-height:86vh;}
.scene--lr{grid-template-columns:58% 1fr;}
.scene--rl{grid-template-columns:1fr 58%;}
.scene__photo{overflow:hidden;position:relative;background:#e8e5e0;}
.scene__photo img{width:100%;height:100%;object-fit:contain;object-position:center;display:block;transition:transform .9s ease;background:#e8e5e0;}
.scene:hover .scene__photo img{transform:scale(1.025);}
.scene__body{display:flex;flex-direction:column;justify-content:center;padding:clamp(3rem,7vw,6rem) clamp(2rem,5vw,4.5rem);background:var(--white);}
.scene__where{font-size:.58rem;letter-spacing:.4em;color:var(--faint);margin-bottom:.6rem;}
.scene__product-name{
  font-size:.62rem;letter-spacing:.25em;color:var(--ink);
  margin-bottom:1.8rem;
  display:flex;align-items:center;gap:.6rem;
}
.scene__product-name span{
  font-size:.55rem;letter-spacing:.2em;color:var(--muted,var(--mid));
}
.scene__h{font-weight:300;font-size:clamp(1rem,2.2vw,1.4rem);letter-spacing:.14em;line-height:1.95;margin-bottom:1.8rem;}
.scene__copy{font-size:.73rem;letter-spacing:.09em;line-height:2.7;color:#696460;margin-bottom:2rem;}

/* 詳しく見るボタン */
.detail-btn{
  display:inline-flex;align-items:center;gap:.7rem;
  border:1px solid var(--faint);background:none;
  padding:.65rem 1.2rem .65rem .9rem;
  cursor:pointer;color:var(--mid);
  font-family:var(--sans);font-size:.62rem;letter-spacing:.22em;font-weight:300;
  margin-bottom:1.8rem;
  border-radius:2px;
  transition:border-color .25s,color .25s,background .25s;
}
.detail-btn:hover{
  border-color:var(--accent);
  color:var(--accent);
  background:rgba(74,98,104,.04);
}
.detail-btn svg{
  width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.5;
  transition:transform .25s;
}
.detail-btn:hover svg{transform:scale(1.15);}

/* STRIP */
.strip{overflow:hidden;padding:clamp(2.5rem,5vw,4rem) 0;background:var(--bg);}
.strip__track{display:flex;gap:.7rem;width:max-content;animation:drift 30s linear infinite;}
@keyframes drift{to{transform:translateX(-50%);}}
.strip__track img{height:clamp(160px,20vw,250px);width:auto;max-width:clamp(160px,20vw,250px);object-fit:contain;flex-shrink:0;opacity:.9;background:#e8e5e0;}

/* CLOSING */
.closing{padding:clamp(7rem,14vw,13rem) clamp(1.8rem,7vw,5.5rem);max-width:460px;}
.closing__quote{font-family:var(--en);font-style:italic;font-weight:300;font-size:clamp(1rem,2.3vw,1.4rem);line-height:1.85;letter-spacing:.03em;color:var(--ink);margin-bottom:2.8rem;}
.closing__body{font-size:.72rem;letter-spacing:.1em;line-height:2.8;color:#696460;}
footer{padding:2.5rem clamp(1.8rem,7vw,5.5rem);border-top:1px solid var(--faint);display:flex;justify-content:space-between;flex-wrap:wrap;gap:.8rem;}
footer p{font-size:.58rem;letter-spacing:.25em;color:var(--faint);}

/* ═══════════════════════════════
   PRODUCT DETAIL MODAL
═══════════════════════════════ */
.modal-overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(20,18,16,.85);
  opacity:0;pointer-events:none;
  transition:opacity .3s ease;
  display:flex;align-items:center;justify-content:center;
  padding:1.5rem;
}
.modal-overlay.open{opacity:1;pointer-events:auto;}
.modal{
  background:var(--white);
  width:100%;max-width:860px;
  max-height:90vh;
  overflow-y:auto;
  transform:translateY(20px);
  transition:transform .35s ease;
  display:grid;
  grid-template-columns:1fr 1fr;
}
.modal-overlay.open .modal{transform:translateY(0);}
.modal__gallery{
  background:#e8e5e0;
  position:relative;
  min-height:400px;
}
.modal__main-img{
  width:100%;height:360px;
  object-fit:contain;object-position:center;
  display:block;background:#e8e5e0;
}
.modal__thumbs{
  display:flex;gap:.4rem;
  padding:.6rem;
  flex-wrap:wrap;
  background:var(--bg);
}
.modal__thumb{
  width:56px;height:56px;
  object-fit:contain;object-position:center;
  cursor:pointer;background:#e8e5e0;
  border:1.5px solid transparent;
  transition:border-color .2s;
  flex-shrink:0;
}
.modal__thumb.active,.modal__thumb:hover{border-color:var(--accent);}
.modal__info{
  padding:2.5rem 2rem;
  display:flex;flex-direction:column;
  justify-content:flex-start;
  overflow-y:auto;
}
.modal__close{
  position:absolute;top:1rem;right:1rem;
  background:rgba(255,255,255,.9);border:none;
  width:32px;height:32px;border-radius:50%;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  z-index:2;
}
.modal__close svg{width:14px;height:14px;stroke:var(--ink);fill:none;stroke-width:2;stroke-linecap:round;}
.modal__en{font-size:.6rem;letter-spacing:.35em;color:var(--accent);margin-bottom:.5rem;}
.modal__name{font-weight:300;font-size:1.3rem;letter-spacing:.12em;margin-bottom:1.2rem;}
.modal__copy{font-size:.75rem;letter-spacing:.09em;line-height:2.6;color:#696460;margin-bottom:2rem;}
.modal__specs{border-top:1px solid var(--faint);padding-top:1.2rem;margin-bottom:1.8rem;}
.modal__spec-row{display:flex;justify-content:space-between;padding:.4rem 0;border-bottom:1px solid #ebe8e3;font-size:.7rem;letter-spacing:.06em;}
.modal__spec-row:last-child{border-bottom:none;}
.modal__spec-row dt{color:var(--mid);}
.modal__price{font-size:.88rem;letter-spacing:.12em;}
.modal__price small{font-size:.62rem;color:var(--mid);margin-left:.4rem;}

@media(max-width:640px){
  .modal{grid-template-columns:1fr;}
  .modal__main-img{height:260px;}
}

/* RESPONSIVE */
@media(max-width:740px){
  .scene--lr,.scene--rl{grid-template-columns:1fr;min-height:auto;}
  .scene--rl .scene__photo{order:-1;}
  .scene__photo{height:62vw;min-height:220px;}
}



/* ═══════════════════════════════
   SORT UI（商品順序）
═══════════════════════════════ */
.sort-list{list-style:none;margin-bottom:1rem;}
.sort-item{
  display:flex;align-items:center;gap:.8rem;
  padding:.65rem .9rem;
  background:var(--bg);border:1px solid var(--faint);
  margin-bottom:.4rem;border-radius:2px;
  cursor:grab;user-select:none;
  transition:background .15s,border-color .15s;
}
.sort-item:active{cursor:grabbing;}
.sort-item.dragging{opacity:.4;}
.sort-item.drag-over{border-color:var(--accent);background:#f0eeea;}
.sort-handle{
  display:flex;flex-direction:column;gap:3px;
  flex-shrink:0;opacity:.4;
}
.sort-handle span{display:block;width:14px;height:1px;background:var(--ink);}
.sort-item__name{font-size:.68rem;letter-spacing:.15em;color:var(--ink);flex:1;}
.sort-item__en{font-size:.58rem;letter-spacing:.15em;color:var(--mid);}
/* ═══════════════════════════════
   PASSWORD MODAL
═══════════════════════════════ */
.pw-overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(30,28,26,.55);
  display:none;align-items:center;justify-content:center;
}
.pw-overlay.open{display:flex;}
.pw-box{
  background:var(--white);
  padding:2.5rem 2rem 2rem;
  width:min(320px,90vw);
  text-align:center;
}
.pw-box h3{
  font-size:.65rem;letter-spacing:.35em;color:var(--mid);
  font-weight:300;margin-bottom:1.8rem;
}
.pw-box input{
  width:100%;padding:.7rem .9rem;
  border:1px solid var(--faint);background:var(--bg);
  font-family:var(--sans);font-size:.85rem;letter-spacing:.2em;
  color:var(--ink);text-align:center;
  border-radius:2px;margin-bottom:.8rem;
}
.pw-box input:focus{outline:none;border-color:var(--accent);}
.pw-submit{
  width:100%;padding:.75rem;
  background:var(--ink);color:#fff;border:none;
  font-family:var(--sans);font-size:.62rem;letter-spacing:.3em;
  cursor:pointer;border-radius:2px;transition:background .2s;
}
.pw-submit:hover{background:var(--accent);}
.pw-error{
  font-size:.62rem;letter-spacing:.1em;color:#c0392b;
  margin-top:.5rem;min-height:1.2em;
}
/* ═══════════════════════════════
   EDIT BUTTON
═══════════════════════════════ */
.edit-btn{
  background:none;border:none;cursor:pointer;padding:0;
  font-family:var(--sans);font-size:.5rem;letter-spacing:.15em;
  color:rgba(200,195,187,.4);transition:color .3s;
  line-height:1;
}
.edit-btn:hover{color:var(--faint);}
.panel-overlay{position:fixed;inset:0;z-index:300;background:rgba(30,28,26,.45);opacity:0;pointer-events:none;transition:opacity .3s ease;}
.panel-overlay.open{opacity:1;pointer-events:auto;}
.edit-panel{position:fixed;top:0;right:0;bottom:0;z-index:400;width:min(480px,100vw);background:var(--white);overflow-y:auto;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
.edit-panel.open{transform:translateX(0);}
.panel-head{padding:1.6rem 1.8rem 1.2rem;border-bottom:1px solid var(--faint);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--white);z-index:1;}
.panel-head h2{font-size:.72rem;letter-spacing:.3em;font-weight:300;color:var(--ink);}
.panel-close{background:none;border:none;cursor:pointer;padding:.3rem;color:var(--mid);}
.panel-close svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;}
.panel-body{padding:1.6rem 1.8rem;flex:1;}
.panel-tabs{display:flex;gap:0;margin-bottom:2rem;border-bottom:1px solid var(--faint);}
.tab-btn{flex:1;padding:.7rem .5rem;font-family:var(--sans);font-size:.62rem;letter-spacing:.2em;font-weight:300;background:none;border:none;cursor:pointer;color:var(--mid);border-bottom:1px solid transparent;margin-bottom:-1px;transition:color .2s,border-color .2s;}
.tab-btn.active{color:var(--ink);border-bottom-color:var(--ink);}
.tab-pane{display:none;}
.tab-pane.active{display:block;}
.field{margin-bottom:1.6rem;}
.field label{display:block;font-size:.6rem;letter-spacing:.25em;color:var(--mid);margin-bottom:.5rem;}
.field input[type=text],.field textarea{width:100%;padding:.65rem .8rem;border:1px solid var(--faint);background:var(--bg);font-family:var(--sans);font-size:.75rem;font-weight:300;color:var(--ink);line-height:1.7;resize:vertical;transition:border-color .2s;border-radius:2px;}
.field input[type=text]:focus,.field textarea:focus{outline:none;border-color:var(--accent);}
.field textarea{min-height:72px;}

/* 画像ドロップ */
.img-drop{position:relative;border:1.5px dashed var(--faint);border-radius:4px;overflow:hidden;cursor:pointer;transition:border-color .2s,background .2s;background:var(--bg);}
.img-drop:hover,.img-drop.drag{border-color:var(--accent);background:#f0eeea;}
.img-drop__preview{width:100%;height:140px;object-fit:contain;object-position:center;display:block;background:#e8e5e0;}
.img-drop__preview.empty{display:none;}
.img-drop__placeholder{height:140px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.6rem;pointer-events:none;}
.img-drop__placeholder svg{width:22px;height:22px;stroke:var(--faint);fill:none;stroke-width:1.5;}
.img-drop__placeholder span{font-size:.6rem;letter-spacing:.15em;color:var(--faint);}
.img-drop__overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5rem;background:rgba(74,98,104,.7);opacity:0;transition:opacity .2s;pointer-events:none;}
.img-drop:hover .img-drop__overlay,.img-drop.drag .img-drop__overlay{opacity:1;}
.img-drop__overlay svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:1.5;}
.img-drop__overlay span{font-size:.6rem;letter-spacing:.15em;color:#fff;}
.img-drop input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0;z-index:1;}
.img-drop .slot-del{display:none;z-index:3;}
.img-drop:hover .slot-del{display:flex;}
.img-drop__uploading{position:absolute;inset:0;background:rgba(246,244,240,.9);display:none;flex-direction:column;align-items:center;justify-content:center;gap:.6rem;}
.img-drop__uploading.show{display:flex;}
.img-drop__uploading span{font-size:.6rem;letter-spacing:.15em;color:var(--accent);}
.upload-bar{width:120px;height:2px;background:var(--faint);border-radius:1px;overflow:hidden;}
.upload-bar__inner{height:100%;background:var(--accent);width:0%;transition:width .3s ease;}

/* 追加画像グリッド（モーダル用） */
.extra-imgs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-top:.4rem;}
.extra-slot{position:relative;border:1.5px dashed var(--faint);border-radius:3px;overflow:hidden;cursor:pointer;aspect-ratio:1;background:var(--bg);}
.extra-slot:hover{border-color:var(--accent);}
.extra-slot img{width:100%;height:100%;object-fit:contain;background:#e8e5e0;display:block;}
.extra-slot img.empty{display:none;}
.extra-slot__ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.65rem;color:var(--faint);}
.extra-slot__up{position:absolute;inset:0;background:rgba(246,244,240,.9);display:none;flex-direction:column;align-items:center;justify-content:center;gap:.4rem;font-size:.58rem;color:var(--accent);}
.extra-slot__up.show{display:flex;}
.extra-slot input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0;}
.slot-del{
  position:absolute;top:3px;right:3px;
  width:20px;height:20px;border-radius:50%;
  background:rgba(37,34,32,.6);border:none;
  cursor:pointer;display:none;
  align-items:center;justify-content:center;z-index:2;
}
.slot-del svg{width:9px;height:9px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;}
.extra-slot:hover .slot-del,
.strip-slot:hover .slot-del{display:flex;}
.slot-del:hover{background:rgba(192,57,43,.85);}

/* ストリップグリッド */
.strip-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin-top:.4rem;}
.strip-slot{position:relative;border:1.5px dashed var(--faint);border-radius:3px;overflow:hidden;cursor:pointer;aspect-ratio:1;background:var(--bg);}
.strip-slot:hover{border-color:var(--accent);}
.strip-slot img{width:100%;height:100%;object-fit:contain;background:#e8e5e0;display:block;}
.strip-slot img.empty{display:none;}
.strip-slot__ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.58rem;letter-spacing:.1em;color:var(--faint);}
.strip-slot input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0;z-index:1;}
.strip-slot__up{position:absolute;inset:0;background:rgba(246,244,240,.9);display:none;flex-direction:column;align-items:center;justify-content:center;gap:.4rem;font-size:.58rem;color:var(--accent);}
.strip-slot__up.show{display:flex;}

/* 商品カード（編集パネル） */
.product-edit-card{border:1px solid var(--faint);border-radius:2px;margin-bottom:1rem;background:var(--bg);overflow:hidden;}
.product-edit-card__head{
  display:flex;align-items:center;justify-content:space-between;
  padding:.9rem 1.1rem;cursor:pointer;
}
.product-edit-card__head:hover{background:#efece7;}
.product-edit-card__title{font-size:.65rem;letter-spacing:.2em;color:var(--ink);}
.product-edit-card__toggle{font-size:.9rem;color:var(--faint);line-height:1;}
.product-edit-card__body{display:none;padding:1.2rem;border-top:1px solid var(--faint);}
.product-edit-card.open .product-edit-card__body{display:block;}
.product-edit-card.open .product-edit-card__toggle{transform:rotate(45deg);}

/* 商品追加・削除ボタン */
.add-product-btn{
  width:100%;padding:.75rem;
  border:1.5px dashed var(--faint);background:none;
  font-family:var(--sans);font-size:.62rem;letter-spacing:.25em;color:var(--mid);
  cursor:pointer;border-radius:2px;margin-bottom:1.4rem;
  transition:border-color .2s,color .2s;
}
.add-product-btn:hover{border-color:var(--accent);color:var(--accent);}
.del-product-btn{
  width:100%;padding:.5rem;margin-top:.8rem;
  border:1px solid #ddd;background:none;
  font-family:var(--sans);font-size:.6rem;letter-spacing:.2em;color:#bbb;
  cursor:pointer;border-radius:2px;
  transition:border-color .2s,color .2s;
}
.del-product-btn:hover{border-color:#c0392b;color:#c0392b;}

.field-sep{height:1px;background:var(--faint);margin:1.6rem 0;}
.panel-foot{padding:1.2rem 1.8rem;border-top:1px solid var(--faint);position:sticky;bottom:0;background:var(--white);}
.save-btn{width:100%;padding:.85rem;background:var(--ink);color:#fff;border:none;cursor:pointer;font-family:var(--sans);font-size:.65rem;letter-spacing:.3em;font-weight:300;transition:background .2s;border-radius:2px;}
.save-btn:hover{background:var(--accent);}
.save-note{font-size:.58rem;letter-spacing:.1em;color:var(--mid);text-align:center;margin-top:.7rem;}

/* ═══════════════════════════════
   IMAGE CROPPER
═══════════════════════════════ */
.crop-overlay{
  position:fixed;inset:0;z-index:600;
  background:rgba(20,18,15,.88);
  display:none;align-items:center;justify-content:center;
}
.crop-overlay.open{display:flex;}
.crop-box{
  background:var(--white);
  padding:1.5rem;
  width:min(480px,95vw);
  display:flex;flex-direction:column;gap:1rem;
}
.crop-box h3{font-size:.65rem;letter-spacing:.3em;color:var(--mid);font-weight:300;}
.crop-canvas-wrap{
  position:relative;
  width:100%;
  aspect-ratio:1;
  background:#111;
  overflow:hidden;
  cursor:crosshair;
  touch-action:none;
}
.crop-canvas-wrap img{
  position:absolute;
  transform-origin:top left;
  user-select:none;
  pointer-events:none;
}
.crop-rect{
  position:absolute;
  border:2px solid #fff;
  box-shadow:0 0 0 9999px rgba(0,0,0,.55);
  cursor:move;
}

const D = {
  opening:{image:'',label:'iliy — Photo Products',sub:'撮ったあとも、その日は続く。\n形にすることで、写真は毎日の景色になる。'},
  intro:{p1:'スマートフォンの中に眠ったまま、\n見返すことのない写真たち。',p2:'形にすることで、\n写真は毎日の景色になります。'},

    {id:'p3',scene:'テーブルの上に',h:'コーヒーを飲みながら、\nふと目が止まる。',copy:'木の板に直接プリント。\nフレームのないパネルは\nどこにでも置ける軽さと\n素材の温かさを持っている。',en:'Wood Panel',ja:'ウッドパネル',specs:[['素材','シナベニヤ'],['設置','壁掛け・スティックスタンド']],sizePrices:[{size:'152SQ',price:'¥3,530'}],image:'',images:[],side:'lr'},

function nl2br(s){return(s||'').replace(/\n/g,'<br>');}

/* ═══════════════════════════════
   RENDER
═══════════════════════════════ */
function render(){
  document.querySelector('.opening__bg').style.backgroundImage=D.opening.image?`url('${D.opening.image}')`:'none';
  document.querySelector('.opening__label').textContent=D.opening.label;

  document.getElementById('closing-quote').innerHTML='\u201c'+nl2br(D.closing.quote)+'\u201d';
  document.getElementById('closing-body').innerHTML=nl2br(D.closing.body);

  const list=document.getElementById('product-list');
  list.innerHTML='';
  D.products.forEach((p,i)=>{
    const el=document.createElement('section');
    el.className=`scene scene--${p.side}`;
    el.innerHTML=`
      <div class="scene__photo rf"><img src="${p.image||''}" alt="${p.ja}"></div>

  const imgs=[...D.strip,...D.strip].filter(s=>s);
  t.innerHTML=imgs.length?imgs.map(src=>`<img src="${src}" alt="">`).join(''):'';
  initObserver();
}

/* ═══════════════════════════════

function openModal(idx){
  const p = D.products[idx];
  // メイン画像 — imageがあればそれ、なければimagesの1枚目
  const allImgs = [p.image, ...(p.images||[])].filter(s=>s);
  const mainSrc = allImgs[0] || '';

  document.getElementById('modal-main').src = mainSrc;

  // サムネイル
  const thumbs = document.getElementById('modal-thumbs');
  thumbs.innerHTML = '';
  allImgs.forEach((src,i)=>{
    const img = document.createElement('img');
    img.src = src;
    img.className = 'modal__thumb' + (i===0?' active':'');
    img.onclick = ()=>{
      document.getElementById('modal-main').src = src;
      thumbs.querySelectorAll('.modal__thumb').forEach(t=>t.classList.remove('active'));
      img.classList.add('active');
    };
    thumbs.appendChild(img);
  });

  // サイズ価格テーブルHTML
  const spHtml = (p.sizePrices && p.sizePrices.length > 0)
    ? `<table class="modal__sp-table">
        <tr><th>サイズ・仕様</th><th style="text-align:right">料金（税込）</th></tr>
        ${p.sizePrices.map(sp=>`<tr><td>${sp.size}</td><td style="text-align:right;color:var(--accent)">${sp.price}</td></tr>`).join('')}
       </table>`
    : (p.price ? `<p class="modal__price">${p.price} <small>${p.priceNote||''}</small></p>` : '');

  // 情報
  document.getElementById('modal-info').innerHTML = `
    <p class="modal__en">${p.en}</p>
    <h2 class="modal__name">${p.ja}</h2>
    <p class="modal__copy">${nl2br(p.copy)}</p>
    <dl class="modal__specs">
      ${(p.specs||[]).map(s=>`<div class="modal__spec-row"><dt>${s[0]}</dt><dd>${s[1]}</dd></div>`).join('')}
    </dl>
    ${spHtml}`;

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
function closeModalOnBg(e){
  if(e.target===document.getElementById('modalOverlay')) closeModal();
}

/* ═══════════════════════════════
   GITHUB
═══════════════════════════════ */
function getGhConfig(){
  const user=document.getElementById('gh-user').value.trim();
  const repo=document.getElementById('gh-repo').value.trim();
  const branch=document.getElementById('gh-branch').value.trim()||'main';
  const token=document.getElementById('gh-token').value.trim();
  if(user&&repo&&token){localStorage.setItem('gh_config',JSON.stringify({user,repo,branch,token}));}
  return{user,repo,branch,token};
}
async function uploadImageToGitHub(file,key){
  const{user,repo,branch,token}=getGhConfig();
  if(!user||!repo||!token)throw new Error('GitHub設定が必要です');
  const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});
  const ext=file.name.split('.').pop().toLowerCase()||'jpg';
  const filename=`images/${key}_${Date.now()}.${ext}`;
  const apiUrl=`https://api.github.com/repos/${user}/${repo}/contents/${filename}`;
  const headers={'Authorization':`Bearer ${token}`,'Content-Type':'application/json','X-GitHub-Api-Version':'2022-11-28'};
  const res=await fetch(apiUrl,{method:'PUT',headers,body:JSON.stringify({message:`upload: ${filename}`,content:b64,branch})});
  if(!res.ok){const e=await res.json();throw new Error(e.message||res.status);}
  return`https://raw.githubusercontent.com/${user}/${repo}/${branch}/${filename}`;
}
function startBar(barId){const bar=document.getElementById(barId);if(!bar)return;let w=0;const iv=setInterval(()=>{w=Math.min(w+Math.random()*15,85);bar.style.width=w+'%';},200);return iv;}
function finishBar(barId,iv){clearInterval(iv);const bar=document.getElementById(barId);if(bar)bar.style.width='100%';}

async function handleImageFile(file,domKey){
  // 画像ファイルならまずクロッパーを開く
  if(file.type.startsWith('image/')){
    openCropper(file,(croppedBlob)=>{
      const croppedFile=new File([croppedBlob],file.name,{type:'image/jpeg'});
      _doUpload(croppedFile,domKey);
    });
    return;
  }
  _doUpload(file,domKey);
}

async function _doUpload(file,domKey){
  const isProduct=domKey.startsWith('product-');
  const isExtra=domKey.startsWith('extra-');
  const isStrip=domKey.startsWith('strip-');
  let upId,barId,prevId,phId;
  if(isStrip){
    const idx=parseInt(domKey.split('-')[1]);
    upId=`sup-${idx}`;barId=`sbar-${idx}`;prevId=`sprev-${idx}`;phId=`sph-${idx}`;
  } else if(isExtra){
    const parts=domKey.split('-');const pi=parseInt(parts[1]);const ei=parseInt(parts[2]);
    upId=`eup-${pi}-${ei}`;barId=`ebar-${pi}-${ei}`;prevId=`eprev-${pi}-${ei}`;phId=`eph-${pi}-${ei}`;
  } else if(isProduct){
    const idx=parseInt(domKey.split('-')[1]);
    upId=`iup-p${idx}`;barId=`ibar-p${idx}`;prevId=`iprev-p${idx}`;phId=`iph-p${idx}`;
  } else {
    upId='iup-opening';barId='ibar-opening';prevId='iprev-opening';phId='iph-opening';
  }
  const upEl=document.getElementById(upId);
  if(upEl)upEl.classList.add('show');
  const iv=startBar(barId);
  try{
    const key=isStrip?`strip${domKey.split('-')[1]}`:isExtra?`extra${domKey.split('-')[1]}_${domKey.split('-')[2]}`:isProduct?`product${domKey.split('-')[1]}`:'opening';
    const rawUrl=await uploadImageToGitHub(file,key);
    finishBar(barId,iv);
    const prev=document.getElementById(prevId);
    if(prev){prev.src=rawUrl;prev.classList.remove('empty');prev.style.display='block';}
    const ph=document.getElementById(phId);
    if(ph)ph.style.display='none';
    if(isStrip){D.strip[parseInt(domKey.split('-')[1])]=rawUrl;}
    else if(isExtra){
      const pi=parseInt(domKey.split('-')[1]);const ei=parseInt(domKey.split('-')[2]);
      if(!D.products[pi].images)D.products[pi].images=[];
      D.products[pi].images[ei]=rawUrl;
    }
    else if(isProduct){D.products[parseInt(domKey.split('-')[1])].image=rawUrl;}
    else{D.opening.image=rawUrl;}
    setTimeout(()=>{if(upEl)upEl.classList.remove('show');},400);
  }catch(e){
    finishBar(barId,iv);
    if(upEl)upEl.classList.remove('show');
    setMsg('アップロード失敗: '+e.message,true);
    if(e.message.includes('GitHub設定')){document.getElementById('gh-setup').style.display='block';}
  }
}
function onDrag(e,el){e.preventDefault();el.classList.add('drag');}
function offDrag(el){el.classList.remove('drag');}
function onDropImg(e,domKey){e.preventDefault();offDrag(e.currentTarget);const file=e.dataTransfer.files[0];if(!file||!file.type.startsWith('image/'))return;handleImageFile(file,domKey);}
function onFileImg(e,domKey){const file=e.target.files[0];if(!file)return;handleImageFile(file,domKey);}

/* ═══════════════════════════════
   PANEL

function togAcc(aId,tId){

function initObserver(){
  const io=new IntersectionObserver(e=>{e.forEach(x=>{if(x.isIntersecting)x.target.classList.add('in');});},{threshold:.08});
  document.querySelectorAll('.r,.rf').forEach(el=>{el.classList.remove('in');io.observe(el);});
}

function addProduct(){
  const newP={
    id:'p'+Date.now(),scene:'',h:'',copy:'',en:'New Product',ja:'新しい商品',
    specs:[['素材',''],['サイズ',''],['設置','']],
    price:'¥0',priceNote:'税込',image:'',images:[],side:'lr'
  };
  D.products.push(newP);
  const pf=document.getElementById('product-fields');

function deleteProduct(i){
  if(!confirm(`「${D.products[i].ja}」を削除しますか？`))return;
  D.products.splice(i,1);
  buildProductFields();
  buildSortList();
}

function buildProductFields(){
  const pf=document.getElementById('product-fields');
  pf.innerHTML='';
  D.products.forEach((p,i)=>{
    pf.appendChild(buildProductField(p,i));
  });
}

async function saveToGitHub(){
  collectFormValues();
  const{user,repo,branch,token}=getGhConfig();
  if(!user||!repo||!token){document.getElementById('gh-setup').style.display='block';setMsg('⚠ GitHub設定を入力してください',true);return;}
  const btn=document.getElementById('gh-save-btn');
  btn.textContent='保存中…';btn.disabled=true;setMsg('');
  const path='data.json';
  const apiBase=`https://api.github.com/repos/${user}/${repo}/contents/${path}`;
  const headers={'Authorization':`Bearer ${token}`,'Content-Type':'application/json','X-GitHub-Api-Version':'2022-11-28'};
  try{
    let sha=null;
    const getRes=await fetch(`${apiBase}?ref=${branch}`,{headers});
    if(getRes.ok){const ex=await getRes.json();sha=ex.sha;}
    const json=JSON.stringify(D,null,2);
    const b64=btoa(unescape(encodeURIComponent(json)));
    const body={message:'update: product data',content:b64,branch,...(sha?{sha}:{})};
    const putRes=await fetch(apiBase,{method:'PUT',headers,body:JSON.stringify(body)});
    if(putRes.ok){setMsg('✓ GitHubに保存しました');render();setTimeout(closePanel,800);}
    else{const err=await putRes.json();setMsg('エラー: '+(err.message||putRes.status),true);}
  }catch(e){setMsg('通信エラー: '+e.message,true);}
  finally{btn.textContent='GitHubに保存';btn.disabled=false;}
}

function buildSortList(){
  const ul = document.getElementById('sort-list');
  ul.innerHTML = '';
  D.products.forEach((p, i) => {
    const li = document.createElement('li');
    li.className = 'sort-item';
    li.draggable = true;
    li.dataset.idx = i;
    li.innerHTML = `
      <div class="sort-handle"><span></span><span></span><span></span></div>
      <div>
        <div class="sort-item__name">${p.ja || '新しい商品'}</div>
        <div class="sort-item__en">${p.en}</div>
      </div>`;

    li.addEventListener('dragstart', e => {
      li.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', i);
    });
    li.addEventListener('dragend', () => {
      li.classList.remove('dragging');
      ul.querySelectorAll('.sort-item').forEach(el => el.classList.remove('drag-over'));
    });
    li.addEventListener('dragover', e => {
      e.preventDefault();
      ul.querySelectorAll('.sort-item').forEach(el => el.classList.remove('drag-over'));
      li.classList.add('drag-over');
    });
    li.addEventListener('drop', e => {
      e.preventDefault();
      const from = parseInt(e.dataTransfer.getData('text/plain'));
      const to   = parseInt(li.dataset.idx);
      if(from === to) return;
      // D.productsを並び替え
      const moved = D.products.splice(from, 1)[0];
      D.products.splice(to, 0, moved);
      // UIを再構築
      buildSortList();
      buildProductFields();
    });
    ul.appendChild(li);
  });
}

/* ═══════════════════════════════
   IMAGE CROPPER
═══════════════════════════════ */
let _cropCallback=null;
let _cropScale=1;
let _cropNaturalW=0,_cropNaturalH=0;
let _cropWrapW=0,_cropWrapH=0;
let _cropX=0,_cropY=0,_cropSize=0;
let _dragMode=null; // 'move'|'resize'
let _dragStartX=0,_dragStartY=0,_dragStartCropX=0,_dragStartCropY=0,_dragStartSize=0;

function openCropper(file, callback){
  _cropCallback=callback;
  const url=URL.createObjectURL(file);
  const img=document.getElementById('cropImg');
  img.onload=()=>{
    _cropNaturalW=img.naturalWidth;
    _cropNaturalH=img.naturalHeight;
    const wrap=document.getElementById('cropWrap');
    _cropWrapW=wrap.offsetWidth;
    _cropWrapH=wrap.offsetHeight;
    // fit image into wrap
    const scaleX=_cropWrapW/_cropNaturalW;
    const scaleY=_cropWrapH/_cropNaturalH;
    _cropScale=Math.min(scaleX,scaleY);
    const dispW=_cropNaturalW*_cropScale;
    const dispH=_cropNaturalH*_cropScale;
    const offX=(_cropWrapW-dispW)/2;
    const offY=(_cropWrapH-dispH)/2;
    img.style.transform=`translate(${offX}px,${offY}px) scale(${_cropScale})`;
    img.style.transformOrigin='top left';
    img.style.width=_cropNaturalW+'px';
    img.style.height=_cropNaturalH+'px';
    // initial crop: center square
    _cropSize=Math.min(dispW,dispH)*0.8;
    _cropX=offX+(dispW-_cropSize)/2;
    _cropY=offY+(dispH-_cropSize)/2;
    updateCropRect();
  };
  img.src=url;
  document.getElementById('cropOverlay').classList.add('open');
}

function updateCropRect(){
  const r=document.getElementById('cropRect');
  r.style.left=_cropX+'px';
  r.style.top=_cropY+'px';
  r.style.width=_cropSize+'px';
  r.style.height=_cropSize+'px';
}

// drag events
const cropWrap=document.addEventListener('DOMContentLoaded',()=>{
  const wrap=document.getElementById('cropWrap');
  const rect=document.getElementById('cropRect');

  const getPos=(e)=>{
    const r=wrap.getBoundingClientRect();
    const src=e.touches?e.touches[0]:e;
    return{x:src.clientX-r.left,y:src.clientY-r.top};
  };

  const onStart=(e)=>{
    if(document.getElementById('cropOverlay').style.display==='none') return;
    const {x,y}=getPos(e);
    const edge=14;
    const inRect=x>=_cropX&&x<=_cropX+_cropSize&&y>=_cropY&&y<=_cropY+_cropSize;
    const onEdge=x>=_cropX+_cropSize-edge||y>=_cropY+_cropSize-edge;
    if(!inRect) return;
    _dragStartX=x;_dragStartY=y;
    _dragStartCropX=_cropX;_dragStartCropY=_cropY;_dragStartSize=_cropSize;
    _dragMode=onEdge?'resize':'move';
    e.preventDefault();
  };
  const onMove=(e)=>{
    if(!_dragMode) return;
    e.preventDefault();
    const {x,y}=getPos(e);
    const dx=x-_dragStartX, dy=y-_dragStartY;
    const img=document.getElementById('cropImg');
    const scaleX=img.getBoundingClientRect().width/_cropNaturalW;
    const scaleY=img.getBoundingClientRect().height/_cropNaturalH;
    const imgRect=img.getBoundingClientRect();
    const wrapRect=wrap.getBoundingClientRect();
    const imgL=imgRect.left-wrapRect.left;
    const imgT=imgRect.top-wrapRect.top;
    const imgW=_cropNaturalW*scaleX;
    const imgH=_cropNaturalH*scaleY;
    if(_dragMode==='move'){
      _cropX=Math.max(imgL,Math.min(_dragStartCropX+dx,imgL+imgW-_cropSize));
      _cropY=Math.max(imgT,Math.min(_dragStartCropY+dy,imgT+imgH-_cropSize));
    } else {
      const delta=Math.max(dx,dy);
      _cropSize=Math.max(40,Math.min(_dragStartSize+delta,imgW,imgH));
      _cropX=Math.min(_dragStartCropX,imgL+imgW-_cropSize);
      _cropY=Math.min(_dragStartCropY,imgT+imgH-_cropSize);
    }
    updateCropRect();
  };
  const onEnd=()=>{_dragMode=null;};
  wrap.addEventListener('mousedown',onStart);
  wrap.addEventListener('touchstart',onStart,{passive:false});
  document.addEventListener('mousemove',onMove);
  document.addEventListener('touchmove',onMove,{passive:false});
  document.addEventListener('mouseup',onEnd);
  document.addEventListener('touchend',onEnd);
});

function cancelCrop(){
  document.getElementById('cropOverlay').classList.remove('open');
  _cropCallback=null;
}

function confirmCrop(){
  const img=document.getElementById('cropImg');
  const wrap=document.getElementById('cropWrap');
  const wrapRect=wrap.getBoundingClientRect();
  const imgRect=img.getBoundingClientRect();
  const scaleX=_cropNaturalW/imgRect.width;
  const scaleY=_cropNaturalH/imgRect.height;
  const cropXInImg=(_cropX-(imgRect.left-wrapRect.left))*scaleX;
  const cropYInImg=(_cropY-(imgRect.top-wrapRect.top))*scaleY;
  const cropSizeInImg=_cropSize*scaleX;
  const canvas=document.createElement('canvas');
  const OUTPUT=800;
  canvas.width=OUTPUT;canvas.height=OUTPUT;
  const ctx=canvas.getContext('2d');
  ctx.drawImage(img,cropXInImg,cropYInImg,cropSizeInImg,cropSizeInImg,0,0,OUTPUT,OUTPUT);
  canvas.toBlob(blob=>{
    if(_cropCallback) _cropCallback(blob);
    document.getElementById('cropOverlay').classList.remove('open');
  },'image/jpeg',0.88);
}

async function init(){
  const saved=JSON.parse(localStorage.getItem('gh_config')||'{}');
  try{
    const res=await fetch('data.json?t='+Date.now());
    if(res.ok){
      const s=await res.json();
      Object.assign(D.opening,s.opening||{});
      Object.assign(D.intro,s.intro||{});
      Object.assign(D.closing,s.closing||{});
      if(s.products)D.products=s.products.map(p=>({images:[],...p}));
      if(s.strip)D.strip=s.strip;
    }
  }catch(e){}
  render();
}
init();
</script>
