<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Products — iliy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400&family=Cormorant+Garamond:ital,wght@1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f6f4f0;--white:#faf9f7;--ink:#252220;--mid:#7a766f;--faint:#c8c3bb;--accent:#4a6268;
  --sans:'Zen Kaku Gothic New',sans-serif;--en:'Cormorant Garamond',Georgia,serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--sans);font-weight:300;background:var(--bg);color:var(--ink);line-height:1.9;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
.r{opacity:0;transform:translateY(14px);transition:opacity 1s ease,transform 1s ease;}
.r.in{opacity:1;transform:translateY(0);}
.rf{opacity:0;transition:opacity 1.4s ease;}
.rf.in{opacity:1;}
.site-header{position:fixed;top:0;left:0;right:0;z-index:100;padding:1.4rem clamp(1.8rem,7vw,5.5rem);display:flex;justify-content:space-between;align-items:center;pointer-events:none;}
.site-header__name{font-size:.65rem;letter-spacing:.45em;color:rgba(255,255,255,.75);font-weight:300;pointer-events:auto;}
.site-header__sub{font-size:.55rem;letter-spacing:.3em;color:rgba(255,255,255,.4);}
.opening{position:relative;height:100svh;min-height:520px;overflow:hidden;}
.opening__bg{position:absolute;inset:0;background-size:cover;background-position:center 30%;background-repeat:no-repeat;filter:brightness(.68) saturate(.82);transform:scale(1.04);animation:zmin 14s ease forwards;}
@keyframes zmin{to{transform:scale(1);}}
.opening__text{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;justify-content:flex-end;padding:0 clamp(1.8rem,7vw,5.5rem) clamp(4rem,10vh,7rem);}
.opening__label{font-size:.6rem;letter-spacing:.4em;color:rgba(255,255,255,.4);margin-bottom:1.2rem;opacity:0;animation:fin .8s .6s ease forwards;}
.opening__sub{font-size:clamp(.75rem,1.6vw,.9rem);letter-spacing:.18em;color:rgba(255,255,255,.7);line-height:2.3;opacity:0;animation:fin .9s .9s ease forwards;}
@keyframes fin{to{opacity:1;}}
.scroll-cue{position:absolute;bottom:2rem;right:2.5rem;z-index:3;display:flex;flex-direction:column;align-items:center;gap:.5rem;}
.scroll-cue span{font-size:.5rem;letter-spacing:.3em;color:rgba(255,255,255,.3);writing-mode:vertical-rl;}
.scroll-cue__bar{width:1px;height:40px;background:rgba(255,255,255,.15);overflow:hidden;position:relative;}
.scroll-cue__bar::after{content:'';position:absolute;top:-100%;left:0;width:1px;height:100%;background:rgba(255,255,255,.6);animation:drop 2s 1.5s ease-in-out infinite;}
@keyframes drop{0%{top:-100%;}100%{top:100%;}}
.intro{padding:clamp(5rem,12vw,10rem) clamp(1.8rem,7vw,5.5rem);max-width:480px;}
.intro p{font-size:.78rem;letter-spacing:.1em;line-height:2.8;color:#5a5750;}
.intro p+p{margin-top:1.8rem;}
.scene{display:grid;min-height:86vh;}
.scene--lr{grid-template-columns:58% 1fr;}
.scene--rl{grid-template-columns:1fr 58%;}
.scene__photo{overflow:hidden;position:relative;}
.scene__photo img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .9s ease;}
.scene:hover .scene__photo img{transform:scale(1.025);}
.scene__body{display:flex;flex-direction:column;justify-content:center;padding:clamp(3rem,7vw,6rem) clamp(2rem,5vw,4.5rem);background:var(--white);}
.scene__where{font-size:.58rem;letter-spacing:.4em;color:var(--faint);margin-bottom:2rem;}
.scene__h{font-weight:300;font-size:clamp(1rem,2.2vw,1.4rem);letter-spacing:.14em;line-height:1.95;margin-bottom:1.8rem;}
.scene__copy{font-size:.73rem;letter-spacing:.09em;line-height:2.7;color:#696460;margin-bottom:2.6rem;}
.ptag{border:none;background:none;padding:0;cursor:pointer;text-align:left;display:inline-block;}
.ptag__en{font-size:.58rem;letter-spacing:.3em;color:var(--accent);display:block;transition:color .2s;}
.ptag__ja{font-size:.66rem;letter-spacing:.12em;color:var(--mid);display:block;margin-top:.18rem;}
.ptag__bar{display:block;height:1px;width:0;background:var(--accent);margin-top:.45rem;transition:width .42s ease;}
.ptag:hover .ptag__bar,.ptag.open .ptag__bar{width:100%;}
.ptag:hover .ptag__en{color:var(--ink);}
.acc{max-height:0;overflow:hidden;transition:max-height .5s ease;}
.acc.open{max-height:300px;}
.acc__in{margin-top:1.4rem;padding-top:1.4rem;border-top:1px solid #e4e0da;}
.acc-row{display:flex;justify-content:space-between;padding:.45rem 0;border-bottom:1px solid #ebe8e3;font-size:.68rem;letter-spacing:.06em;}
.acc-row:last-of-type{border-bottom:none;}
.acc-row dt{color:var(--mid);}
.acc-price{margin-top:1.2rem;font-size:.78rem;letter-spacing:.12em;}
.acc-price small{font-size:.6rem;color:var(--mid);margin-left:.4rem;}
.strip{overflow:hidden;padding:clamp(2.5rem,5vw,4rem) 0;background:var(--bg);}
.strip__track{display:flex;gap:.7rem;width:max-content;animation:drift 30s linear infinite;}
@keyframes drift{to{transform:translateX(-50%);}}
.strip__track img{height:clamp(160px,20vw,250px);width:auto;object-fit:cover;flex-shrink:0;opacity:.9;}
.closing{padding:clamp(7rem,14vw,13rem) clamp(1.8rem,7vw,5.5rem);max-width:460px;}
.closing__quote{font-family:var(--en);font-style:italic;font-weight:300;font-size:clamp(1rem,2.3vw,1.4rem);line-height:1.85;letter-spacing:.03em;color:var(--ink);margin-bottom:2.8rem;}
.closing__body{font-size:.72rem;letter-spacing:.1em;line-height:2.8;color:#696460;}
footer{padding:2.5rem clamp(1.8rem,7vw,5.5rem);border-top:1px solid var(--faint);display:flex;justify-content:space-between;flex-wrap:wrap;gap:.8rem;}
footer p{font-size:.58rem;letter-spacing:.25em;color:var(--faint);}
@media(max-width:740px){
  .scene--lr,.scene--rl{grid-template-columns:1fr;min-height:auto;}
  .scene--rl .scene__photo{order:-1;}
  .scene__photo{height:62vw;min-height:220px;}
}
.edit-btn{position:fixed;bottom:2rem;right:2rem;z-index:200;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.92);border:1px solid var(--faint);cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,.08);transition:background .2s,transform .2s;}
.edit-btn:hover{background:#fff;transform:scale(1.06);}
.edit-btn svg{width:16px;height:16px;stroke:var(--mid);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.panel-overlay{position:fixed;inset:0;z-index:300;background:rgba(30,28,26,.45);opacity:0;pointer-events:none;transition:opacity .3s ease;}
.panel-overlay.open{opacity:1;pointer-events:auto;}
.edit-panel{position:fixed;top:0;right:0;bottom:0;z-index:400;width:min(480px,100vw);background:var(--white);overflow-y:auto;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
.edit-panel.open{transform:translateX(0);}
.panel-head{padding:1.6rem 1.8rem 1.2rem;border-bottom:1px solid var(--faint);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--white);z-index:1;}
.panel-head h2{font-size:.72rem;letter-spacing:.3em;font-weight:300;color:var(--ink);}
.panel-close{background:none;border:none;cursor:pointer;padding:.3rem;color:var(--mid);}
.panel-close svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;}
.panel-body{padding:1.6rem 1.8rem;flex:1;}
.panel-tabs{display:flex;gap:0;margin-bottom:2rem;border-bottom:1px solid var(--faint);}
.tab-btn{flex:1;padding:.7rem .5rem;font-family:var(--sans);font-size:.62rem;letter-spacing:.2em;font-weight:300;background:none;border:none;cursor:pointer;color:var(--mid);border-bottom:1px solid transparent;margin-bottom:-1px;transition:color .2s,border-color .2s;}
.tab-btn.active{color:var(--ink);border-bottom-color:var(--ink);}
.tab-pane{display:none;}
.tab-pane.active{display:block;}
.field{margin-bottom:1.6rem;}
.field label{display:block;font-size:.6rem;letter-spacing:.25em;color:var(--mid);margin-bottom:.5rem;}
.field input[type=text],.field textarea{width:100%;padding:.65rem .8rem;border:1px solid var(--faint);background:var(--bg);font-family:var(--sans);font-size:.75rem;font-weight:300;color:var(--ink);line-height:1.7;resize:vertical;transition:border-color .2s;border-radius:2px;}
.field input[type=text]:focus,.field textarea:focus{outline:none;border-color:var(--accent);}
.field textarea{min-height:72px;}

/* ════ 画像ドロップゾーン ════ */
.img-drop{position:relative;border:1.5px dashed var(--faint);border-radius:4px;overflow:hidden;cursor:pointer;transition:border-color .2s,background .2s;background:var(--bg);}
.img-drop:hover,.img-drop.drag{border-color:var(--accent);background:#f0eeea;}
.img-drop__preview{width:100%;height:140px;object-fit:cover;display:block;}
.img-drop__preview.empty{display:none;}
.img-drop__placeholder{height:140px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.6rem;pointer-events:none;}
.img-drop__placeholder svg{width:22px;height:22px;stroke:var(--faint);fill:none;stroke-width:1.5;}
.img-drop__placeholder span{font-size:.6rem;letter-spacing:.15em;color:var(--faint);}
.img-drop__overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5rem;background:rgba(74,98,104,.7);opacity:0;transition:opacity .2s;pointer-events:none;}
.img-drop:hover .img-drop__overlay,.img-drop.drag .img-drop__overlay{opacity:1;}
.img-drop__overlay svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:1.5;}
.img-drop__overlay span{font-size:.6rem;letter-spacing:.15em;color:#fff;}
.img-drop input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0;}
.img-drop__uploading{position:absolute;inset:0;background:rgba(246,244,240,.9);display:none;flex-direction:column;align-items:center;justify-content:center;gap:.6rem;}
.img-drop__uploading.show{display:flex;}
.img-drop__uploading span{font-size:.6rem;letter-spacing:.15em;color:var(--accent);}
.upload-bar{width:120px;height:2px;background:var(--faint);border-radius:1px;overflow:hidden;}
.upload-bar__inner{height:100%;background:var(--accent);width:0%;transition:width .3s ease;}

.product-edit-card{border:1px solid var(--faint);border-radius:2px;padding:1.2rem 1.2rem 1.4rem;margin-bottom:1.4rem;background:var(--bg);}
.product-edit-card summary{font-size:.65rem;letter-spacing:.25em;color:var(--ink);cursor:pointer;list-style:none;display:flex;align-items:center;justify-content:space-between;}
.product-edit-card summary::after{content:'＋';color:var(--faint);font-size:.8rem;}
.product-edit-card[open] summary::after{content:'－';}
.product-edit-card .inner{padding-top:1.2rem;}
.field-sep{height:1px;background:var(--faint);margin:1.6rem 0;}
.panel-foot{padding:1.2rem 1.8rem;border-top:1px solid var(--faint);position:sticky;bottom:0;background:var(--white);}
.save-btn{width:100%;padding:.85rem;background:var(--ink);color:#fff;border:none;cursor:pointer;font-family:var(--sans);font-size:.65rem;letter-spacing:.3em;font-weight:300;transition:background .2s;border-radius:2px;}
.save-btn:hover{background:var(--accent);}
.save-note{font-size:.58rem;letter-spacing:.1em;color:var(--mid);text-align:center;margin-top:.7rem;}
</style>
</head>
<body>

<script>
const D = {
  opening:{image:'',label:'iliy — Photo Products',sub:'撮ったあとも、その日は続く。\n形にすることで、写真は毎日の景色になる。'},
  intro:{p1:'スマートフォンの中に眠ったまま、\n見返すことのない写真たち。',p2:'形にすることで、\n写真は毎日の景色になります。'},
  closing:{quote:'無理にすすめることはしません。\nただ、選択肢として\n知っていてほしくて。',body:'撮影後、ゆっくりご検討ください。\n当日でも、後日でも。'},
  products:[
    {id:'p1',scene:'棚の上に',h:'本の隣、\n植物のそば。',copy:'生活の中にすでにある場所に、\nそっと加わる一枚。\n最初からそこにあったような\n自然なたたずまい。',en:'Wood Frame',ja:'ウッドフレーム',specs:[['素材','オーク材 / ガラス（仮）'],['サイズ','〇〇 × 〇〇 cm（仮）'],['設置','壁掛け・スタンド']],price:'¥10,000',priceNote:'税込 / 仮価格',image:'',side:'lr'},
    {id:'p2',scene:'壁に',h:'何もなかった壁が、\n語りはじめる。',copy:'存在感はあるのに、\n主張しない。\nそういう一枚が\n部屋を変えます。',en:'Matt Frame',ja:'マットフレーム',specs:[['素材','マット紙 / アルミ（仮）'],['サイズ','〇〇 × 〇〇 cm（仮）'],['設置','壁掛け・スタンド']],price:'¥12,000',priceNote:'税込 / 仮価格',image:'',side:'rl'},
    {id:'p3',scene:'テーブルの上に',h:'コーヒーを飲みながら、\nふと目が止まる。',copy:'木の板に直接プリント。\nフレームのないパネルは\nどこにでも置ける軽さと\n素材の温かさを持っている。',en:'Wood Panel',ja:'ウッドパネル',specs:[['素材','シナベニヤ（仮）'],['サイズ','〇〇 × 〇〇 cm（仮）'],['設置','壁掛け・スティックスタンド']],price:'¥8,000',priceNote:'税込 / 仮価格',image:'',side:'lr'},
    {id:'p4',scene:'広い壁に',h:'一枚だけ、\n大きく。',copy:'薄く、軽い。\n横長のフォーマットが\n部屋に静かな広がりをつくる。',en:'Fabric Panel',ja:'ファブリックパネル',specs:[['素材','ポリエステル / アルミ（仮）'],['サイズ','〇〇 × 〇〇 cm（仮）'],['設置','壁掛け・スタンド']],price:'¥15,000',priceNote:'税込 / 仮価格',image:'',side:'rl'},
  ],
  strip:['','','','','',''],
};

function nl2br(s){return s.replace(/\n/g,'<br>');}

function render(){
  document.querySelector('.opening__bg').style.backgroundImage=D.opening.image?`url('${D.opening.image}')`:'none';
  document.querySelector('.opening__label').textContent=D.opening.label;
  document.querySelector('.opening__sub').innerHTML=nl2br(D.opening.sub);
  document.getElementById('intro-p1').innerHTML=nl2br(D.intro.p1);
  document.getElementById('intro-p2').innerHTML=nl2br(D.intro.p2);
  document.getElementById('closing-quote').innerHTML='\u201c'+nl2br(D.closing.quote)+'\u201d';
  document.getElementById('closing-body').innerHTML=nl2br(D.closing.body);
  const list=document.getElementById('product-list');
  list.innerHTML='';
  D.products.forEach((p,i)=>{
    const el=document.createElement('section');
    el.className=`scene scene--${p.side}`;
    el.innerHTML=`
      <div class="scene__photo rf"><img src="${p.image}" alt="${p.ja}"></div>
      <div class="scene__body">
        <p class="scene__where r">${p.scene}</p>
        <h2 class="scene__h r">${nl2br(p.h)}</h2>
        <p class="scene__copy r">${nl2br(p.copy)}</p>
        <div class="r">
          <button class="ptag" id="tag${i}" onclick="togAcc('acc${i}','tag${i}')">
            <span class="ptag__en">${p.en}</span><span class="ptag__ja">${p.ja}</span><span class="ptag__bar"></span>
          </button>
          <div class="acc" id="acc${i}">
            <div class="acc__in">
              <dl>${p.specs.map(s=>`<div class="acc-row"><dt>${s[0]}</dt><dd>${s[1]}</dd></div>`).join('')}</dl>
              <p class="acc-price">${p.price} <small>${p.priceNote}</small></p>
            </div>
          </div>
        </div>
      </div>`;
    if(p.side==='rl'){el.appendChild(el.querySelector('.scene__photo'));}
    list.appendChild(el);
  });
  const t=document.getElementById('strip-track');
  const imgs=[...D.strip,...D.strip].filter(s=>s);
  t.innerHTML=imgs.map(src=>`<img src="${src}" alt="">`).join('');
  initObserver();
}
</script>

<header class="site-header">
  <span class="site-header__name">iliy</span>
  <span class="site-header__sub">Family Photo Studio</span>
</header>
<section class="opening">
  <div class="opening__bg"></div>
  <div class="opening__text">
    <p class="opening__label"></p>
    <p class="opening__sub"></p>
  </div>
  <div class="scroll-cue"><div class="scroll-cue__bar"></div><span>scroll</span></div>
</section>
<div class="intro r"><p id="intro-p1"></p><p id="intro-p2"></p></div>
<div id="product-list"></div>
<div class="strip"><div class="strip__track" id="strip-track"></div></div>
<div class="closing r">
  <p class="closing__quote" id="closing-quote"></p>
  <p class="closing__body" id="closing-body"></p>
</div>
<footer><p>iliy — Family Photo Studio</p><p>Photo Products</p></footer>

<button class="edit-btn" onclick="openPanel()" title="編集">
  <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
</button>
<div class="panel-overlay" id="overlay" onclick="closePanel()"></div>

<div class="edit-panel" id="editPanel">
  <div class="panel-head">
    <h2>EDIT CONTENT</h2>
    <button class="panel-close" onclick="closePanel()">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="panel-body">
    <div class="panel-tabs">
      <button class="tab-btn active" onclick="showTab('tab-page',this)">ページ</button>
      <button class="tab-btn" onclick="showTab('tab-products',this)">商品</button>
    </div>
    <div class="tab-pane active" id="tab-page">
      <div class="field">
        <label>トップ画像</label>
        <div class="img-drop" id="idrop-opening" ondragover="onDrag(event,this)" ondragleave="offDrag(this)" ondrop="onDropImg(event,'opening-img')">
          <img class="img-drop__preview empty" id="iprev-opening" src="" alt="">
          <div class="img-drop__placeholder" id="iph-opening">
            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <span>ドロップ または クリック</span>
          </div>
          <div class="img-drop__overlay">
            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <span>ここに写真をドロップ</span>
          </div>
          <div class="img-drop__uploading" id="iup-opening">
            <div class="upload-bar"><div class="upload-bar__inner" id="ibar-opening"></div></div>
            <span>GitHubにアップロード中…</span>
          </div>
          <input type="file" accept="image/*" onchange="onFileImg(event,'opening-img')">
        </div>
      </div>
      <div class="field"><label>トップ キャッチコピー</label><textarea id="f-opening-sub" rows="2"></textarea></div>
      <div class="field-sep"></div>
      <div class="field"><label>イントロ 1行目</label><textarea id="f-intro-p1" rows="2"></textarea></div>
      <div class="field"><label>イントロ 2行目</label><textarea id="f-intro-p2" rows="2"></textarea></div>
      <div class="field-sep"></div>
      <div class="field"><label>クロージング 引用文</label><textarea id="f-closing-quote" rows="3"></textarea></div>
      <div class="field"><label>クロージング 本文</label><textarea id="f-closing-body" rows="2"></textarea></div>
    </div>
    <div class="tab-pane" id="tab-products">
      <div id="product-fields"></div>
    </div>
  </div>
  <div class="panel-foot">
    <div id="gh-setup" style="margin-bottom:1rem;display:none;">
      <div class="field" style="margin-bottom:.6rem;"><label>GitHub ユーザー名</label><input type="text" id="gh-user" placeholder="例: iliypicniko-hub"></div>
      <div class="field" style="margin-bottom:.6rem;"><label>リポジトリ名</label><input type="text" id="gh-repo" placeholder="例: iliy-item"></div>
      <div class="field" style="margin-bottom:.6rem;"><label>ブランチ名</label><input type="text" id="gh-branch" value="main"></div>
      <div class="field" style="margin-bottom:0;"><label>Personal Access Token</label><input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxx"></div>
    </div>
    <div style="display:flex;gap:.6rem;margin-bottom:.6rem;">
      <button class="save-btn" style="flex:1;" onclick="saveAll()">ページに反映</button>
      <button class="save-btn" id="gh-save-btn" style="flex:1;background:var(--accent);" onclick="saveToGitHub()">GitHubに保存</button>
    </div>
    <button onclick="toggleGhSetup()" style="width:100%;background:none;border:1px solid var(--faint);padding:.5rem;font-family:var(--sans);font-size:.58rem;letter-spacing:.2em;color:var(--mid);cursor:pointer;border-radius:2px;">⚙ GitHub設定</button>
    <p class="save-note" id="save-msg"></p>
  </div>
</div>

<script>
/* ── GitHub設定取得 ── */
function getGhConfig(){
  const user  =document.getElementById('gh-user').value.trim();
  const repo  =document.getElementById('gh-repo').value.trim();
  const branch=document.getElementById('gh-branch').value.trim()||'main';
  const token =document.getElementById('gh-token').value.trim();
  if(user&&repo&&token){localStorage.setItem('gh_config',JSON.stringify({user,repo,branch,token}));}
  return{user,repo,branch,token};
}

/* ── 画像をGitHubにアップロードしてRaw URLを返す ── */
async function uploadImageToGitHub(file, key){
  const {user,repo,branch,token}=getGhConfig();
  if(!user||!repo||!token) throw new Error('GitHub設定が必要です');

  // ファイルをbase64に変換
  const b64 = await new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=rej;
    r.readAsDataURL(file);
  });

  // ファイル名をユニークに（タイムスタンプ付き）
  const ext = file.name.split('.').pop().toLowerCase();
  const filename = `images/${key}_${Date.now()}.${ext}`;
  const apiUrl = `https://api.github.com/repos/${user}/${repo}/contents/${filename}`;
  const headers={'Authorization':`Bearer ${token}`,'Content-Type':'application/json','X-GitHub-Api-Version':'2022-11-28'};

  const res = await fetch(apiUrl,{
    method:'PUT',
    headers,
    body:JSON.stringify({message:`upload image: ${filename}`,content:b64,branch})
  });
  if(!res.ok){const e=await res.json();throw new Error(e.message||res.status);}

  return `https://raw.githubusercontent.com/${user}/${repo}/${branch}/${filename}`;
}

/* ── 進捗バーアニメ ── */
function startBar(barId){
  const bar=document.getElementById(barId);
  if(!bar)return;
  let w=0;
  const iv=setInterval(()=>{w=Math.min(w+Math.random()*15,85);bar.style.width=w+'%';},200);
  return iv;
}
function finishBar(barId,iv){
  clearInterval(iv);
  const bar=document.getElementById(barId);
  if(bar){bar.style.width='100%';}
}

/* ── ドロップ/ファイル選択の共通処理 ── */
async function handleImageFile(file, domKey){
  // domKey例: 'opening-img' or 'product-0'
  const isProduct = domKey.startsWith('product-');
  const idx = isProduct ? parseInt(domKey.split('-')[1]) : null;
  const upId = isProduct ? `iup-p${idx}` : `iup-opening`;
  const barId = isProduct ? `ibar-p${idx}` : `ibar-opening`;
  const prevId = isProduct ? `iprev-p${idx}` : `iprev-opening`;
  const phId = isProduct ? `iph-p${idx}` : `iph-opening`;

  // アップロード中UI表示
  const upEl=document.getElementById(upId);
  if(upEl) upEl.classList.add('show');
  const iv=startBar(barId);

  try{
    const rawUrl = await uploadImageToGitHub(file, isProduct?`product${idx}`:'opening');
    finishBar(barId,iv);

    // プレビュー更新
    const prev=document.getElementById(prevId);
    if(prev){prev.src=rawUrl;prev.classList.remove('empty');}
    const ph=document.getElementById(phId);
    if(ph) ph.style.display='none';

    // Dに保存
    if(isProduct){ D.products[idx].image=rawUrl; }
    else { D.opening.image=rawUrl; }

    setTimeout(()=>{if(upEl)upEl.classList.remove('show');},400);
  }catch(e){
    finishBar(barId,iv);
    if(upEl)upEl.classList.remove('show');
    setMsg('画像アップロード失敗: '+e.message, true);
    // GitHub設定が未入力なら設定欄を開く
    if(e.message.includes('GitHub設定')){
      document.getElementById('gh-setup').style.display='block';
      toggleGhSetup();
    }
  }
}

function onDrag(e,el){e.preventDefault();el.classList.add('drag');}
function offDrag(el){el.classList.remove('drag');}
function onDropImg(e, domKey){
  e.preventDefault();offDrag(e.currentTarget);
  const file=e.dataTransfer.files[0];
  if(!file||!file.type.startsWith('image/'))return;
  handleImageFile(file,domKey);
}
function onFileImg(e, domKey){
  const file=e.target.files[0];
  if(!file)return;
  handleImageFile(file,domKey);
}

/* ── アコーディオン ── */
function togAcc(aId,tId){
  const a=document.getElementById(aId),t=document.getElementById(tId);
  const was=a.classList.contains('open');
  document.querySelectorAll('.acc').forEach(x=>x.classList.remove('open'));
  document.querySelectorAll('.ptag').forEach(x=>x.classList.remove('open'));
  if(!was){a.classList.add('open');t.classList.add('open');}
}
function initObserver(){
  const io=new IntersectionObserver(e=>{e.forEach(x=>{if(x.isIntersecting)x.target.classList.add('in');});},{threshold:.08});
  document.querySelectorAll('.r,.rf').forEach(el=>{el.classList.remove('in');io.observe(el);});
}

function closePanel(){
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('editPanel').classList.remove('open');
}
function showTab(id,btn){
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}
function toggleGhSetup(){
  const el=document.getElementById('gh-setup');
  el.style.display=el.style.display==='none'?'block':'none';
  const saved=JSON.parse(localStorage.getItem('gh_config')||'{}');
  if(saved.user)  document.getElementById('gh-user').value  =saved.user;
  if(saved.repo)  document.getElementById('gh-repo').value  =saved.repo;
  if(saved.branch)document.getElementById('gh-branch').value=saved.branch;
  if(saved.token) document.getElementById('gh-token').value =saved.token;
}
function setMsg(text,isError=false){
  const el=document.getElementById('save-msg');
  el.textContent=text;
  el.style.color=isError?'#c0392b':'var(--mid)';
}
function collectFormValues(){
  D.opening.sub      =document.getElementById('f-opening-sub').value;
  D.intro.p1         =document.getElementById('f-intro-p1').value;
  D.intro.p2         =document.getElementById('f-intro-p2').value;
  D.closing.quote    =document.getElementById('f-closing-quote').value;
  D.closing.body     =document.getElementById('f-closing-body').value;
  D.products.forEach((p,i)=>{
    p.scene    =document.getElementById(`ps-${i}`).value;
    p.h        =document.getElementById(`ph-${i}`).value;
    p.copy     =document.getElementById(`pc-${i}`).value;
    p.en       =document.getElementById(`pen-${i}`).value;
    p.ja       =document.getElementById(`pja-${i}`).value;
    p.price    =document.getElementById(`ppr-${i}`).value;
    p.priceNote=document.getElementById(`ppn-${i}`).value;
    p.specs.forEach((s,j)=>{s[1]=document.getElementById(`psp-${i}-${j}`).value;});
  });
}
async function saveToGitHub(){
  collectFormValues();
  const{user,repo,branch,token}=getGhConfig();
  if(!user||!repo||!token){document.getElementById('gh-setup').style.display='block';setMsg('⚠ GitHub設定を入力してください',true);return;}
  const btn=document.getElementById('gh-save-btn');
  btn.textContent='保存中…';btn.disabled=true;setMsg('');
  const path='data.json';
  const apiBase=`https://api.github.com/repos/${user}/${repo}/contents/${path}`;
  const headers={'Authorization':`Bearer ${token}`,'Content-Type':'application/json','X-GitHub-Api-Version':'2022-11-28'};
  try{
    let sha=null;
    const getRes=await fetch(`${apiBase}?ref=${branch}`,{headers});
    if(getRes.ok){const ex=await getRes.json();sha=ex.sha;}
    const json=JSON.stringify(D,null,2);
    const b64=btoa(unescape(encodeURIComponent(json)));
    const body={message:'update: product data',content:b64,branch,...(sha?{sha}:{})};
    const putRes=await fetch(apiBase,{method:'PUT',headers,body:JSON.stringify(body)});
    if(putRes.ok){setMsg('✓ GitHubに保存しました');render();setTimeout(closePanel,800);}
    else{const err=await putRes.json();setMsg('エラー: '+(err.message||putRes.status),true);}
  }catch(e){setMsg('通信エラー: '+e.message,true);}
  finally{btn.textContent='GitHubに保存';btn.disabled=false;}
}
function saveAll(){collectFormValues();render();closePanel();}
async function init(){
  try{
    const res=await fetch('data.json?t='+Date.now());
    if(res.ok){
      const saved=await res.json();
      Object.assign(D.opening,saved.opening||{});
      Object.assign(D.intro,  saved.intro  ||{});
      Object.assign(D.closing,saved.closing||{});
      if(saved.products)D.products=saved.products;
      if(saved.strip)   D.strip   =saved.strip;
    }
  }catch(e){}
  render();
}
init();
